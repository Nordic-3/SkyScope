server.error.whitelabel.enabled=false
spring.application.name=SkyScope
spring.profiles.active=dev
use_apis=false

spring.security.oauth2.client.registration.keycloak.client-id=skyscope-client
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8080/login/oauth2/code/keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8081/realms/sky-scope
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
keycloak.auth-server-url=http://localhost:8081
keycloak.realm=sky-scope
keycloak.auth-password-change-url=http://localhost:8081/realms/sky-scope/protocol/openid-connect/auth
keycloack.kc_action=%s?client_id=%s&response_type=code&scope=openid&kc_action=UPDATE_PASSWORD&redirect_uri=%s
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_SECRET}
stripe_secret=${STRIPE_SECRET}
