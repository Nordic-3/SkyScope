services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    command:
      - start-dev
      - --import-realm
    ports:
      - "8081:8081"
    volumes:
      - ./keycloak/skyscope-realm.json:/opt/keycloak/data/import/realm.json
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_PORT: 8081
      KC_HOSTNAME_URL: http://keycloak:8081
      KC_HEALTH_ENABLED: "true"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep '200 OK'; } 0<>/dev/tcp/127.0.0.1/9000" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  skyscope:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      keycloak:
        condition: service_healthy
    restart: on-failure
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8081/realms/sky-scope
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8081/realms/sky-scope
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8081
      KEYCLOAK_AUTH_PASSWORD_CHANGE_URL: http://keycloak:8081/realms/sky-scope/protocol/openid-connect/auth
      STRIPE_SECRET: ${STRIPE_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_SECRET}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge