services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    command:
      - start-dev
      - --import-realm
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak_data:/opt/keycloak/data
      - ./keycloak/skyscope-realm.json:/opt/keycloak/data/import/realm.json
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: true
