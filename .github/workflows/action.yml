name: Run automata tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    env:
      STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
      KEYCLOAK_SECRET: ${{ secrets.KEYCLOAK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Map 'keycloak' to localhost in /etc/hosts
        run: echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Start the application
        run: chmod +x ./start.sh
      - name: Start application
        run: ./start.sh
      - name: Verify application startup
        uses: jtalk/url-health-check-action@v4
        with:
          url: http://localhost:8080/actuator/health
          max-attempts: 10
          retry-delay: 5s
          retry-all: true
      - name: Show Docker logs if startup failed
        if: failure()
        run: |
          echo "----------------------------------------"
          echo " SKYSCOPE (SPRING BOOT) LOGS:"
          echo "----------------------------------------"
          docker compose logs skyscope
          
          echo "----------------------------------------"
          echo " KEYCLOAK LOGS:"
          echo "----------------------------------------"
          docker compose logs keycloak
      - name: Run automata tests
        env:
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          KEYCLOAK_SECRET: ${{ secrets.KEYCLOAK_SECRET }}
        run: mvn verify -Pautomata-tests -Dheadless=true
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: target/screenshots/
